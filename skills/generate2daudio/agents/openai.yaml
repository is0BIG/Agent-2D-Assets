interface:
  display_name: "Generate 2D Audio"
  short_description: "Game SFX, loops, audio packs, and metadata."
  default_prompt: "Use $generate2daudio to create or process 2D game audio assets such as UI clicks, combat hits, spell bundles, pickups, ambience loops, and engine-ready WAV metadata; infer the audio plan, synthesize simple local SFX when appropriate, process supplied WAV files with trim/fade/normalize settings, analyze duration, peak, RMS, clipping, and loop metadata, and export audio files plus manifests for Godot, Unity, web, or raw 2D game projects."
