name: tests

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Compile scripts
        run: |
          python -m py_compile \
            skills/generate2dsprite/scripts/generate2dsprite.py \
            skills/generate2dsprite/scripts/import_generated_image.py \
            skills/generate2dsprite/scripts/image_provider.py \
            skills/generate2dsprite/scripts/generate_qc_report.py \
            skills/generate2dsprite/scripts/make_layout_guide.py \
            skills/generate2dmap/scripts/extract_prop_pack.py \
            skills/generate2dmap/scripts/compose_layered_preview.py
      - name: Run tests
        run: python -m unittest discover -s tests
